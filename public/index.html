<!DOCTYPE html>
<html>
<head>

    <title>AIR CONSOLE</title>

    <link rel="stylesheet" href="style.css">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

</head>
<body class="pc-body">

<h1 class="title">
🎮 AIR CONSOLE
</h1>

<!-- WAITING SCREEN -->

<div id="waitingScreen">

    <h2>
    ROOM CODE
    </h2>

    <div id="roomCode" class="room-code">

    </div>

    <h3 id="playerCount">
    Players Joined: 0
    </h3>

    <button
    class="start-btn"
    onclick="startSetup()">

        DID ALL PLAYERS JOIN?

    </button>

</div>

<!-- BUTTON TEST -->

<div
id="testScreen"
style="display:none;">

    <h1>
    🎮 CONTROLLER TEST
    </h1>

    <p>
    PRESS ALL BUTTONS
    </p>

    <div class="test-box">

        <div id="leftStatus">
            ⬅️ Left ❌
        </div>

        <div id="rightStatus">
            ➡️ Right ❌
        </div>

        <div id="upStatus">
            ⬆️ Up ❌
        </div>

        <div id="downStatus">
            ⬇️ Down ❌
        </div>

    </div>

</div>

<!-- GAME MENU -->

<div
id="menuScreen"
style="display:none;">

    <h1>
    🎮 SELECT GAME
    </h1>

    <div class="menu">

        <div
        class="menu-item selected"
        id="item0">

            🏎️ Racing

        </div>

        <div
        class="menu-item"
        id="item1">

            🃏 UNO

        </div>

        <div
        class="menu-item"
        id="item2">

            🐍 Snake

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

// RANDOM ROOM CODE

const room =
Math.floor(
100000 + Math.random() * 900000
).toString();

document.getElementById("roomCode")
.innerText = room;

socket.emit("join-room", room);

// PLAYER COUNT

socket.on("player-count", (count) => {

    document.getElementById("playerCount")
    .innerText =
    "Players Joined: " + (count - 1);

});

// START SETUP

function startSetup(){

    document.getElementById("waitingScreen")
    .style.display = "none";

    document.getElementById("testScreen")
    .style.display = "block";

}

// BUTTON TEST

let tested = {

    left:false,
    right:false,
    up:false,
    down:false

};

// MENU

let selected = 0;

const menuItems =
document.querySelectorAll(".menu-item");

// CONTROLLER INPUT

socket.on("controller-update", (dir) => {

    // TEST BUTTONS

    if(dir === "left"){

        tested.left = true;

        document.getElementById(
        "leftStatus"
        ).innerHTML =
        "⬅️ Left ✅";

    }

    if(dir === "right"){

        tested.right = true;

        document.getElementById(
        "rightStatus"
        ).innerHTML =
        "➡️ Right ✅";

    }

    if(dir === "up"){

        tested.up = true;

        document.getElementById(
        "upStatus"
        ).innerHTML =
        "⬆️ Up ✅";

    }

    if(dir === "down"){

        tested.down = true;

        document.getElementById(
        "downStatus"
        ).innerHTML =
        "⬇️ Down ✅";

    }

    // ALL BUTTONS WORKING

    if(

        tested.left &&
        tested.right &&
        tested.up &&
        tested.down

    ){

        setTimeout(() => {

            document.getElementById(
            "testScreen"
            ).style.display = "none";

            document.getElementById(
            "menuScreen"
            ).style.display = "block";

        }, 1000);

    }

    // MENU CONTROL

    if(

        document.getElementById(
        "menuScreen"
        ).style.display === "block"

    ){

        menuItems.forEach(item => {

            item.classList.remove("selected");

        });

        if(dir === "down"){

            selected++;

        }

        if(dir === "up"){

            selected--;

        }

        if(selected < 0){

            selected = 0;

        }

        if(selected > 2){

            selected = 2;

        }

        menuItems[selected]
        .classList.add("selected");

    }

});

</script>

</body>
</html>
