<!DOCTYPE html>
<html>
<head>

    <title>Air Racing</title>

    <link rel="stylesheet" href="style.css">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

</head>
<body class="race-body">

<h1>
🏎️ AIR RACING
</h1>

<h2 id="score">
Score: 0
</h2>

<div class="race-game">

    <div id="playerCar"></div>

    <div id="enemyCar"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const room = "HRI123";

socket.emit("join-room", room);

const playerCar =
document.getElementById("playerCar");

const enemyCar =
document.getElementById("enemyCar");

let playerX = 170;

let enemyY = -100;

let enemyX =
Math.floor(Math.random() * 340);

let score = 0;

// CONTROLLER INPUT
socket.on("controller-update", (dir) => {

    if(dir === "left"){

        playerX -= 25;

    }

    if(dir === "right"){

        playerX += 25;

    }

    // LIMITS

    if(playerX < 0){

        playerX = 0;

    }

    if(playerX > 340){

        playerX = 340;

    }

    playerCar.style.left =
    playerX + "px";

});

// GAME LOOP

function gameLoop(){

    enemyY += 6;

    enemyCar.style.top =
    enemyY + "px";

    enemyCar.style.left =
    enemyX + "px";

    // RESET ENEMY

    if(enemyY > 600){

        enemyY = -100;

        enemyX =
        Math.floor(Math.random() * 340);

        score++;

        document.getElementById("score")
        .innerText =
        "Score: " + score;

    }

    // COLLISION

    const playerRect =
    playerCar.getBoundingClientRect();

    const enemyRect =
    enemyCar.getBoundingClientRect();

    if(

        playerRect.left < enemyRect.right &&
        playerRect.right > enemyRect.left &&
        playerRect.top < enemyRect.bottom &&
        playerRect.bottom > enemyRect.top

    ){

        alert(
        "💥 GAME OVER\nScore: " + score
        );

        location.reload();

    }

    requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
